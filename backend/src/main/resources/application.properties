# PredictiveMaintenanceLite - Application Configuration

spring.application.name=PredictiveMaintenanceLite

# ---- Server ----
server.port=8081
server.servlet.context-path=/

# ---- Database (MySQL) ----
# createDatabaseIfNotExist=true makes the JDBC driver auto-create the schema
# on first connection if it doesn't exist yet.
spring.datasource.url=jdbc:mysql://localhost:3306/pml_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=nv@2398

# ---- JPA / Hibernate ----
# update = keep existing data, add new columns/tables as entities evolve.
# Use create-drop for a clean slate every restart, validate for production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ---- Jackson ----
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ---- JWT ----
app.jwt.secret=UHJlZGljdGl2ZU1haW50ZW5hbmNlTGl0ZVNlY3JldEtleV9Gb3JKV1RfNTEyYml0XzIwMjYhQCMkJV4mKigpWA==

# ---- Pagination defaults ----
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
